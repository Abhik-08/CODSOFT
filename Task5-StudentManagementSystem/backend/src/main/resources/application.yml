server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: eduvault-api
  
  datasource:
    url: jdbc:h2:mem:eduvaultdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Firebase credentials configs placeholders
firebase:
  config-path: classpath:firebase-service-account.json
